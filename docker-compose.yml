version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: bubble-mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  redis:
    image: redis:alpine
    container_name: bubble-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: bubble-backend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - mongodb
      - redis
    env_file:
      - ./Backend/.env
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/bubble-chat
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production

  website:
    build:
      context: ./Website
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-https://bubble-backend-production-96a0.up.railway.app/api/v1}
        - VITE_ZEGO_APP_ID=${VITE_ZEGO_APP_ID:-}
        - VITE_ZEGO_SERVER_SECRET=${VITE_ZEGO_SERVER_SECRET:-}
    container_name: bubble-website
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  mongodb_data:
  redis_data:
