version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: bubble-mongodb-dev
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data_dev:/data/db

  redis:
    image: redis:alpine
    container_name: bubble-redis-dev
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data_dev:/data

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile.dev
    container_name: bubble-backend-dev
    ports:
      - "3000:3000"
    volumes:
      - ./Backend:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      - mongodb
      - redis
    env_file:
      - ./Backend/.env
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/bubble-chat
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=development

  website:
    build:
      context: ./Website
      dockerfile: Dockerfile.dev
    container_name: bubble-website-dev
    ports:
      - "8080:8080"
    volumes:
      - ./Website:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      - backend
    environment:
      - NODE_ENV=development

volumes:
  mongodb_data_dev:
  redis_data_dev:
